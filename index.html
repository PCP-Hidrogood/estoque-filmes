<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Corte de Filmes e Telas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --surface2: #22263a;
            --border: #2e3347;
            --border-light: #3a4060;
            --accent: #4f7cff;
            --accent-hover: #3a65e8;
            --accent-glow: rgba(79,124,255,0.18);
            --text-primary: #e8eaf2;
            --text-secondary: #8890a8;
            --text-muted: #555e7a;
            --green: #22c55e;
            --green-bg: rgba(34,197,94,0.12);
            --green-border: rgba(34,197,94,0.3);
            --yellow: #f59e0b;
            --yellow-bg: rgba(245,158,11,0.12);
            --yellow-border: rgba(245,158,11,0.3);
            --red: #ef4444;
            --red-bg: rgba(239,68,68,0.12);
            --red-border: rgba(239,68,68,0.3);
            --radius: 10px;
            --radius-sm: 6px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg);
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            padding: 24px 16px 48px;
        }

        /* ── HEADER ─────────────────────────────── */
        .header {
            text-align: center;
            margin-bottom: 32px;
        }
        .header-eyebrow {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.18em;
            color: var(--accent);
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        .header h1 {
            font-size: clamp(20px, 3vw, 32px);
            font-weight: 800;
            letter-spacing: -0.02em;
            color: var(--text-primary);
            line-height: 1.15;
        }
        .header h1 span {
            background: linear-gradient(90deg, #4f7cff, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header-line {
            width: 48px;
            height: 3px;
            background: linear-gradient(90deg, var(--accent), #a78bfa);
            border-radius: 99px;
            margin: 16px auto 0;
        }

        /* ── CONTAINER ──────────────────────────── */
        .container {
            max-width: 1380px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            overflow: hidden;
        }

        /* ── TABS ───────────────────────────────── */
        .tabs {
            display: flex;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
        }
        .tab-btn {
            padding: 16px 22px;
            border: none;
            background: none;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-muted);
            letter-spacing: 0.03em;
            transition: color 0.2s;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            font-family: 'Inter', sans-serif;
        }
        .tab-btn:hover { color: var(--text-secondary); }
        .tab-btn.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        /* ── TAB CONTENT ────────────────────────── */
        .tab-content { display: none; padding: 24px; }
        .tab-content.active { display: block; }

        /* ── MESSAGES ───────────────────────────── */
        .mensagem {
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            margin-bottom: 18px;
            font-weight: 500;
            font-size: 13px;
            display: none;
        }
        .erro { background: var(--red-bg); color: var(--red); border: 1px solid var(--red-border); }
        .sucesso { background: var(--green-bg); color: var(--green); border: 1px solid var(--green-border); }

        /* ── TABLE ──────────────────────────────── */
        .table-responsive {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1100px;
            font-size: 13px;
        }
        thead th {
            padding: 12px 14px;
            text-align: left;
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tbody td {
            padding: 13px 14px;
            border-bottom: 1px solid var(--border);
            color: var(--text-primary);
            vertical-align: middle;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover td { background: var(--surface2); }

        .id-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            color: var(--text-muted);
        }
        .num-cell {
            font-family: 'JetBrains Mono', monospace;
            font-size: 12px;
            font-weight: 500;
        }
        .bold-cell { font-weight: 600; }

        /* ── STATUS BADGES ──────────────────────── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            border-radius: 99px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
        .badge-disponivel {
            background: var(--green-bg);
            color: var(--green);
            border: 1px solid var(--green-border);
        }
        .badge-disponivel::before { background: var(--green); }
        .badge-reserva {
            background: var(--yellow-bg);
            color: var(--yellow);
            border: 1px solid var(--yellow-border);
        }
        .badge-reserva::before { background: var(--yellow); }
        .badge-falta {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-border);
        }
        .badge-falta::before { background: var(--red); }
        .badge-default {
            background: var(--surface2);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }
        .badge-default::before { background: var(--text-muted); }

        /* ── ACTION BUTTONS ─────────────────────── */
        .actions { display: flex; gap: 6px; align-items: center; }

        button { font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.15s; }

        .btn-baixa {
            background: var(--red-bg);
            color: var(--red);
            border: 1px solid var(--red-border);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .btn-baixa:hover {
            background: var(--red);
            color: #fff;
        }
        .btn-reservar {
            background: var(--yellow-bg);
            color: var(--yellow);
            border: 1px solid var(--yellow-border);
            padding: 6px 12px;
            font-size: 11px;
            font-weight: 700;
            border-radius: var(--radius-sm);
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }
        .btn-reservar:hover {
            background: var(--yellow);
            color: #000;
        }

        /* ── FORM ───────────────────────────────── */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
            gap: 16px;
            margin-bottom: 20px;
        }
        .form-group { display: flex; flex-direction: column; gap: 6px; }
        .form-group.span2 { grid-column: span 2; }

        label {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        input, select {
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus, select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
        select option { background: var(--surface2); }

        .btn-submit {
            background: var(--accent);
            color: #fff;
            grid-column: 1 / -1;
            font-size: 14px;
            font-weight: 700;
            padding: 14px;
            border-radius: var(--radius-sm);
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }
        .btn-submit:hover { background: var(--accent-hover); box-shadow: 0 0 20px var(--accent-glow); }

        /* ── MODAL OVERLAY ──────────────────────── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.72);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
            overflow: hidden;
            animation: modal-in 0.2s ease;
        }
        @keyframes modal-in {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal-header {
            padding: 20px 24px;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-header h2 {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-primary);
        }
        .modal-header .modal-sub {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        .modal-close {
            background: none;
            color: var(--text-muted);
            font-size: 20px;
            line-height: 1;
            padding: 4px;
            border-radius: 4px;
        }
        .modal-close:hover { color: var(--text-primary); background: var(--border); }

        .modal-body { padding: 24px; }

        .modal-info-row {
            display: flex;
            justify-content: space-between;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 12px 14px;
            margin-bottom: 20px;
            font-size: 13px;
        }
        .modal-info-row .lbl { color: var(--text-muted); font-weight: 500; }
        .modal-info-row .val { color: var(--text-primary); font-weight: 700; font-family: 'JetBrains Mono', monospace; }

        .modal-field { margin-bottom: 16px; }
        .modal-field label {
            display: block;
            margin-bottom: 6px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .modal-field label .req { color: var(--accent); margin-left: 2px; }
        .modal-field input {
            width: 100%;
        }

        .modal-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            background: var(--surface2);
        }
        .btn-cancel {
            background: none;
            border: 1px solid var(--border-light);
            color: var(--text-secondary);
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
        }
        .btn-cancel:hover { background: var(--surface); color: var(--text-primary); }

        .btn-confirm {
            background: var(--accent);
            color: #fff;
            padding: 10px 24px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }
        .btn-confirm:hover { background: var(--accent-hover); box-shadow: 0 0 16px var(--accent-glow); }
        .btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ── RESPONSIVE ──────────────────────────── */
        @media (max-width: 640px) {
            body { padding: 12px 8px 40px; }
            .container { border-radius: 12px; }
            .tab-btn { padding: 14px 14px; font-size: 12px; }
            .tab-content { padding: 16px; }
            .form-group.span2 { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <!-- MODAL DE RESERVA -->
    <div id="modal-reserva" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h2>📋 Registrar Reserva</h2>
                    <div class="modal-sub" id="modal-desc-produto"></div>
                </div>
                <button class="modal-close" id="modal-close-btn" title="Fechar">✕</button>
            </div>
            <div class="modal-body">
                <div class="modal-info-row">
                    <span class="lbl">Saldo livre disponível</span>
                    <span class="val" id="modal-saldo">— m</span>
                </div>
                <div class="modal-field">
                    <label>Nº do Pedido <span class="req">*</span></label>
                    <input type="text" id="reserva-pedido" placeholder="Ex: PED-2024-001" />
                </div>
                <div class="modal-field">
                    <label>Metros Lineares a Reservar <span class="req">*</span></label>
                    <input type="number" id="reserva-mts" step="0.01" min="0.01" placeholder="Ex: 5.00" />
                </div>
                <div class="modal-field">
                    <label>Observação <span style="color:var(--text-muted);font-weight:400;">(opcional)</span></label>
                    <input type="text" id="reserva-obs" placeholder="Informação adicional..." />
                </div>
                <div id="modal-erro" class="mensagem erro" style="margin-bottom:0;"></div>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" id="modal-cancel-btn">Cancelar</button>
                <button class="btn-confirm" id="modal-confirm-btn">✓ Confirmar Reserva</button>
            </div>
        </div>
    </div>

    <!-- CABEÇALHO -->
    <div class="header">
        <div class="header-eyebrow">Sistema de Gestão</div>
        <h1>Controle de Corte de<br><span>Filmes e Telas</span></h1>
        <div class="header-line"></div>
    </div>

    <div class="container">
        <div class="tabs">
            <button id="tab-visualizar-btn" class="tab-btn active">Visualizar / Gerenciar</button>
            <button id="tab-inserir-btn" class="tab-btn">Inserir Novo Item</button>
        </div>

        <!-- ABA: VISUALIZAR -->
        <div id="visualizar" class="tab-content active">
            <div id="mensagem-visualizar" class="mensagem"></div>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Descrição</th>
                            <th>Característica</th>
                            <th>Largura (m)</th>
                            <th>Compr. (m)</th>
                            <th>Qtd Rolos</th>
                            <th>Qtd m²</th>
                            <th>Mts Lineares</th>
                            <th>Reserva (m)</th>
                            <th>Saldo Livre</th>
                            <th>Status</th>
                            <th>Observação</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="dados-tabela">
                        <tr><td colspan="13">Carregando dados do estoque...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ABA: INSERIR -->
        <div id="inserir" class="tab-content">
            <div id="mensagem-inserir" class="mensagem"></div>
            <form id="produto-form">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="descricao_do_produto">Descrição do Produto</label>
                        <input type="text" id="descricao_do_produto" required />
                    </div>
                    <div class="form-group">
                        <label for="caracteristica">Característica</label>
                        <input type="text" id="caracteristica" />
                    </div>
                    <div class="form-group">
                        <label for="largura_mts">Largura (mts)</label>
                        <input type="number" id="largura_mts" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="comprim_mts">Comprimento (mts)</label>
                        <input type="number" id="comprim_mts" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="qtde_rolos_un">Qtd Rolos (un)</label>
                        <input type="number" id="qtde_rolos_un" required />
                    </div>
                    <div class="form-group">
                        <label for="qtde_m2">Qtd m²</label>
                        <input type="number" id="qtde_m2" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="mts_lineares">Mts Lineares</label>
                        <input type="number" id="mts_lineares" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="reserva_mts">Reserva (mts)</label>
                        <input type="number" id="reserva_mts" step="0.01" value="0" />
                    </div>
                    <div class="form-group">
                        <label for="saldo_livre_mts">Saldo Livre</label>
                        <input type="number" id="saldo_livre_mts" step="0.01" required />
                    </div>
                    <div class="form-group">
                        <label for="status">Status</label>
                        <select id="status">
                            <option value="Disponível">Disponível</option>
                            <option value="Indisponível">Indisponível</option>
                        </select>
                    </div>
                    <div class="form-group span2">
                        <label for="observacao">Observação</label>
                        <input type="text" id="observacao" />
                    </div>
                    <button type="submit" class="btn-submit">Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script>
    (function () {
        'use strict';

        // ── CONFIGURAÇÃO SUPABASE ────────────────
        const SUPABASE_URL      = 'https://hbchbgymexmlbkyyydqu.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_7p2JEkqrYIFG3dhuk_33yA_QMHxSiJt';
        const NOME_TABELA       = 'produtos';
        const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // ── DOM ──────────────────────────────────
        const tbody          = document.getElementById('dados-tabela');
        const form           = document.getElementById('produto-form');
        const tabVisualizar  = document.getElementById('visualizar');
        const tabInserir     = document.getElementById('inserir');
        const btnVisualizar  = document.getElementById('tab-visualizar-btn');
        const btnInserir     = document.getElementById('tab-inserir-btn');
        const msgVisualizar  = document.getElementById('mensagem-visualizar');
        const msgInserir     = document.getElementById('mensagem-inserir');

        // Modal
        const modalOverlay   = document.getElementById('modal-reserva');
        const modalDescProd  = document.getElementById('modal-desc-produto');
        const modalSaldo     = document.getElementById('modal-saldo');
        const modalPedido    = document.getElementById('reserva-pedido');
        const modalMts       = document.getElementById('reserva-mts');
        const modalObs       = document.getElementById('reserva-obs');
        const modalErro      = document.getElementById('modal-erro');
        const btnModalClose  = document.getElementById('modal-close-btn');
        const btnModalCancel = document.getElementById('modal-cancel-btn');
        const btnModalConfirm= document.getElementById('modal-confirm-btn');

        let reservaItemAtual = null; // armazena o item sendo reservado

        // ── MENSAGENS ────────────────────────────
        function exibirMensagem(el, texto, tipo) {
            el.textContent = texto;
            el.className = 'mensagem ' + tipo;
            el.style.display = 'block';
            clearTimeout(el._t);
            el._t = setTimeout(() => { el.style.display = 'none'; }, 5000);
        }
        function exibirErro(el, err)    { exibirMensagem(el, '❌ ' + (err.message || err), 'erro'); }
        function exibirSucesso(el, txt) { exibirMensagem(el, '✅ ' + txt, 'sucesso'); }

        // ── BADGE DE STATUS ──────────────────────
        function badgeStatus(status) {
            const s = (status || '').toLowerCase();
            let cls = 'badge-default';
            if (s === 'disponível' || s === 'disponivel')    cls = 'badge-disponivel';
            else if (s === 'com reserva')                    cls = 'badge-reserva';
            else if (s === 'falta' || s === 'indisponível')  cls = 'badge-falta';
            return `<span class="badge ${cls}">${escapeHTML(status || '—')}</span>`;
        }

        // ── CARREGAR DADOS ───────────────────────
        async function carregarDados() {
            tbody.innerHTML = '<tr><td colspan="13" style="color:var(--text-muted);padding:20px;">Carregando dados...</td></tr>';
            msgVisualizar.style.display = 'none';
            try {
                const { data, error } = await sb.from(NOME_TABELA).select('*').order('id', { ascending: true });
                if (error) throw error;
                if (!data || data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="13" style="color:var(--text-muted);padding:20px;">Nenhum produto cadastrado.</td></tr>';
                    return;
                }
                let html = '';
                data.forEach(item => {
                    const pedidoInfo = item.pedido
                        ? `<span style="font-family:JetBrains Mono,monospace;font-size:11px;color:var(--yellow);">${escapeHTML(item.pedido)}</span>`
                        : `<span style="color:var(--text-muted);">—</span>`;
                    html += `
                    <tr>
                        <td class="id-cell">${item.id}</td>
                        <td class="bold-cell">${escapeHTML(item.descricao_do_produto || '')}</td>
                        <td style="color:var(--text-secondary);">${escapeHTML(item.caracteristica || '—')}</td>
                        <td class="num-cell">${item.largura_mts ?? 0}</td>
                        <td class="num-cell">${item.comprim_mts ?? 0}</td>
                        <td class="num-cell">${item.qtde_rolos_un ?? 0}</td>
                        <td class="num-cell">${item.qtde_m2 ?? 0}</td>
                        <td class="num-cell">${item.mts_lineares ?? 0}</td>
                        <td class="num-cell" style="color:var(--yellow);">${item.reserva_mts ?? 0}</td>
                        <td class="num-cell" style="color:var(--green);font-weight:700;">${item.saldo_livre_mts ?? 0}</td>
                        <td>${badgeStatus(item.status)}</td>
                        <td style="color:var(--text-secondary);font-size:12px;">${escapeHTML(item.observacao || '—')}</td>
                        <td>
                            <div class="actions">
                                <button class="btn-baixa"  data-id="${item.id}">BAIXA</button>
                                <button class="btn-reservar" data-id="${item.id}"
                                    data-desc="${escapeHTML(item.descricao_do_produto || '')}"
                                    data-saldo="${item.saldo_livre_mts ?? 0}"
                                    data-reserva="${item.reserva_mts ?? 0}">RESERVAR</button>
                            </div>
                        </td>
                    </tr>`;
                });
                tbody.innerHTML = html;

                // Eventos
                document.querySelectorAll('.btn-baixa').forEach(btn => {
                    btn.addEventListener('click', () => baixarItem(parseInt(btn.dataset.id, 10)));
                });
                document.querySelectorAll('.btn-reservar').forEach(btn => {
                    btn.addEventListener('click', () => abrirModalReserva({
                        id:      parseInt(btn.dataset.id, 10),
                        desc:    btn.dataset.desc,
                        saldo:   parseFloat(btn.dataset.saldo),
                        reserva: parseFloat(btn.dataset.reserva)
                    }));
                });
            } catch (err) {
                tbody.innerHTML = `<tr><td colspan="13" style="color:var(--red);padding:20px;">Erro ao carregar dados: ${escapeHTML(err.message || 'Erro desconhecido')}</td></tr>`;
                exibirErro(msgVisualizar, err);
            }
        }

        // ── BAIXA (excluir) ──────────────────────
        async function baixarItem(id) {
            if (!confirm(`Confirmar BAIXA permanente do produto ID ${id}?`)) return;
            try {
                const { error } = await sb.from(NOME_TABELA).delete().eq('id', id);
                if (error) throw error;
                exibirSucesso(msgVisualizar, `Baixa registrada — Produto ID ${id} removido.`);
                await carregarDados();
            } catch (err) {
                exibirErro(msgVisualizar, err);
            }
        }

        // ── MODAL RESERVA ────────────────────────
        function abrirModalReserva(item) {
            reservaItemAtual = item;
            modalDescProd.textContent = item.desc;
            modalSaldo.textContent    = item.saldo + ' m lineares';
            modalPedido.value = '';
            modalMts.value    = '';
            modalObs.value    = '';
            modalErro.style.display = 'none';
            modalMts.max = item.saldo;
            modalOverlay.classList.add('open');
            setTimeout(() => modalPedido.focus(), 100);
        }

        function fecharModal() {
            modalOverlay.classList.remove('open');
            reservaItemAtual = null;
        }

        btnModalClose.addEventListener('click', fecharModal);
        btnModalCancel.addEventListener('click', fecharModal);
        modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) fecharModal(); });

        btnModalConfirm.addEventListener('click', async () => {
            modalErro.style.display = 'none';

            const pedido = modalPedido.value.trim();
            const mts    = parseFloat(modalMts.value);
            const obs    = modalObs.value.trim();

            // Validações
            if (!pedido) {
                exibirMensagem(modalErro, '❌ O número do pedido é obrigatório.', 'erro');
                modalErro.style.display = 'block';
                modalPedido.focus();
                return;
            }
            if (!modalMts.value || isNaN(mts) || mts <= 0) {
                exibirMensagem(modalErro, '❌ Informe uma quantidade válida de metros lineares.', 'erro');
                modalErro.style.display = 'block';
                modalMts.focus();
                return;
            }
            if (mts > reservaItemAtual.saldo) {
                exibirMensagem(modalErro, `❌ Quantidade (${mts} m) excede o saldo livre (${reservaItemAtual.saldo} m).`, 'erro');
                modalErro.style.display = 'block';
                modalMts.focus();
                return;
            }

            btnModalConfirm.disabled = true;
            btnModalConfirm.textContent = 'Salvando…';

            try {
                const novaReserva  = reservaItemAtual.reserva + mts;
                const novoSaldo    = parseFloat((reservaItemAtual.saldo - mts).toFixed(4));

                const { error } = await sb.from(NOME_TABELA).update({
                    reserva_mts:    novaReserva,
                    saldo_livre_mts: novoSaldo,
                    status:         'Com Reserva',
                    pedido:         pedido,
                    obs_reserva:    obs || null
                }).eq('id', reservaItemAtual.id);

                if (error) throw error;

                fecharModal();
                exibirSucesso(msgVisualizar, `Reserva de ${mts} m registrada para o pedido "${pedido}".`);
                await carregarDados();
            } catch (err) {
                exibirMensagem(modalErro, '❌ Erro ao salvar: ' + (err.message || err), 'erro');
                modalErro.style.display = 'block';
            } finally {
                btnModalConfirm.disabled = false;
                btnModalConfirm.textContent = '✓ Confirmar Reserva';
            }
        });

        // ── INSERIR ──────────────────────────────
        form.addEventListener('submit', async function (e) {
            e.preventDefault();
            const novoItem = {
                descricao_do_produto: document.getElementById('descricao_do_produto').value.trim(),
                caracteristica:       document.getElementById('caracteristica').value.trim(),
                largura_mts:          parseFloat(document.getElementById('largura_mts').value),
                comprim_mts:          parseFloat(document.getElementById('comprim_mts').value),
                qtde_rolos_un:        parseInt(document.getElementById('qtde_rolos_un').value, 10),
                qtde_m2:              parseFloat(document.getElementById('qtde_m2').value),
                mts_lineares:         parseFloat(document.getElementById('mts_lineares').value),
                reserva_mts:          parseFloat(document.getElementById('reserva_mts').value) || 0,
                saldo_livre_mts:      parseFloat(document.getElementById('saldo_livre_mts').value),
                status:               document.getElementById('status').value,
                observacao:           document.getElementById('observacao').value.trim()
            };
            if (!novoItem.descricao_do_produto) {
                exibirErro(msgInserir, 'A descrição do produto é obrigatória.');
                return;
            }
            try {
                const { error } = await sb.from(NOME_TABELA).insert([novoItem]).select();
                if (error) throw error;
                exibirSucesso(msgInserir, 'Produto cadastrado com sucesso!');
                form.reset();
                switchTab('visualizar');
            } catch (err) {
                exibirErro(msgInserir, err);
            }
        });

        // ── ABAS ─────────────────────────────────
        function switchTab(id) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            if (id === 'visualizar') {
                tabVisualizar.classList.add('active');
                btnVisualizar.classList.add('active');
                carregarDados();
            } else {
                tabInserir.classList.add('active');
                btnInserir.classList.add('active');
                msgInserir.style.display = 'none';
            }
        }
        btnVisualizar.addEventListener('click', () => switchTab('visualizar'));
        btnInserir.addEventListener('click',    () => switchTab('inserir'));

        // ── INIT ─────────────────────────────────
        window.addEventListener('load', carregarDados);

        // ── ESCAPE HTML ──────────────────────────
        function escapeHTML(str) {
            if (!str) return '';
            return str.replace(/[&<>"]/g, m =>
                ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;' }[m] || m));
        }

        // Exporta funções globais
        window.switchTab = switchTab;
        window.carregarDados = carregarDados;
    })();
    </script>
</body>
</html>

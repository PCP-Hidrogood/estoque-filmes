<script>
    // Cole aqui os dados daquela página de chaves (API) que você abriu antes:
    const SUPABASE_URL = "https://supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_p2JEkqrYlIGSBdhuk_tEzA_QmKSSf5v_F8r0KIDpXREOshCfeDk7gWl7S5Wst7e6pX6i4-t1mQv7-5mK0nS6qA==";
    const NOME_TABELA = "produtos";

    // Inicializa o cliente Supabase
    const supabase = Supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        document.getElementById(tabId).classList.add('active');
        event.currentTarget.classList.add('active');
        if(tabId === 'visualizar') carregarDados();
    }

    async function carregarDados() {
        const tbody = document.getElementById('dados-tabela');
        tbody.innerHTML = '<tr><td colspan="13">Carregando dados...</td></tr>';
        
        const { data, error } = await supabase.from(NOME_TABELA).select('*').order('id', { ascending: true });

        if (error) {
            console.error("Erro no Supabase:", error);
            tbody.innerHTML = `<tr><td colspan="13" style="color:red;">Erro: ${error.message}</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        if(data.length === 0) {
            tbody.innerHTML = '<tr><td colspan="13">Nenhum dado encontrado.</td></tr>';
            return;
        }

        data.forEach(item => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${item.id}</td>
                <td>${item.descricao_produto || ''}</td>
                <td>${item.caracteristica || ''}</td>
                <td>${item.largura_mts || 0}</td>
                <td>${item.comprim_mts || 0}</td>
                <td>${item.qtde_rolos_un || 0}</td>
                <td>${item.qtde_m2 || 0}</td>
                <td>${item.mts_lineares || 0}</td>
                <td>${item.reserva_mts || 0}</td>
                <td>${item.saldo_libre_m || item.saldo_livre_m || 0}</td>
                <td>${item.status || ''}</td>
                <td>${item.observacao || ''}</td>
                <td><button class="btn-delete" onclick="deletarItem(${item.id})">Excluir</button></td>
            `;
            tbody.appendChild(tr);
        });
    }

    document.getElementById('produto-form').addEventListener('submit', async (e) => {
        e.preventDefault();

        // Mapeamento exato com as colunas que estão na sua foto
        const novoProduto = {
            descricao_produto: document.getElementById('descricao_produto').value,
            caracteristica: document.getElementById('caracteristica').value,
            largura_mts: parseFloat(document.getElementById('largura_mts').value),
            comprim_mts: parseFloat(document.getElementById('comprim_mts').value),
            qtde_rolos_un: parseInt(document.getElementById('qtde_rolos_un').value),
            qtde_m2: parseFloat(document.getElementById('qtde_m2').value),
            mts_lineares: parseFloat(document.getElementById('mts_lineares').value),
            reserva_mts: parseFloat(document.getElementById('reserva_mts').value) || 0,
            saldo_libre_m: parseFloat(document.getElementById('saldo_livre_m').value), // Altere para saldo_livre_m se no banco terminar com "v"
            status: document.getElementById('status').value,
            observacao: document.getElementById('observacao').value
        };

        const { error } = await supabase.from(NOME_TABELA).insert([novoProduto]);

        if (error) {
            alert('Erro ao salvar: ' + error.message);
        } else {
            alert('Item salvo com sucesso!');
            document.getElementById('produto-form').reset();
            switchTab('visualizar');
        }
    });

    async function deletarItem(id) {
        if (!confirm(`Excluir o ID ${id}?`)) return;

        const { error } = await supabase.from(NOME_TABELA).delete().eq('id', id);

        if (error) {
            alert('Erro ao deletar: ' + error.message);
        } else {
            carregarDados();
        }
    }

    window.onload = carregarDados;
</script>
